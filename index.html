<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 壽星專屬！生日驚喜九宮格 🎁</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4E1 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #FF69B4;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* 3x3 九宮格容器 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* 卡片基礎 3D 設定 */
        .card {
            perspective: 1000px;
            cursor: pointer;
            height: 100px;
            width: 100px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.15);
            border-radius: 15px;
        }

        /* 未翻牌時的呼吸律動 */
        .card:not(.flipped) .card-inner {
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* 翻牌動作 */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            padding: 5px;
        }

        /* 正面：奶油金黃禮物盒 */
        .card-front {
            background: linear-gradient(135deg, #FFE4B5 0%, #FFD700 100%);
            border: 3px solid #FFF;
        }

        .card-front .gift-icon {
            font-size: 36px;
        }

        .card-front .click-me {
            font-size: 11px;
            color: #D2691E;
            font-weight: bold;
            background: rgba(255,255,255,0.7);
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* 背面：中獎結果 */
        .card-back {
            background-color: #FFFFFF;
            border: 3px solid #FF69B4;
            transform: rotateY(180deg);
            color: #333;
        }

        .card-back .prize-icon {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .card-back .prize-name {
            font-size: 11px;
            font-weight: bold;
            color: #FF1493;
        }

        /* 可愛彈窗樣式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #FFF;
            width: 85%;
            max-width: 320px;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #FFB6C1;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal-title {
            font-size: 20px;
            color: #FF69B4;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .modal-text {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .modal-btn {
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎂 Happy Birthday! 🎁</h1>
        <p class="subtitle">親愛的壽星，快來翻開你的專屬生日好禮吧！</p>

            <div class="card" onclick="openCard(this)">

                    <div class="card-back"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
                </div>

                </div>
            </div>
            <div class="card" onclick="openCard(this)">
                <div class="card-inner">
                    <div class="card-front"><div class="gift-icon">🎁</div><div class="click-me">點我抽</div></div>
                    <div class="card-back"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
                </div>

                    <div class="card-back"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
                </div>
            </div>
            <div class="card" onclick="openCard(this)">
                <div class="card-inner">
                    <div class="card-front"><div class="gift-icon">🎁</div><div class="click-me">點我抽</div></div>
                    <div class="card-back"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
                </div>
            </div>

                <div class="card-inner">

                    <div class="card-back"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>

                    <div class="card-back"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
                </div>
            </div>
            <div class="card" onclick="openCard(this)">
                <div class="card-inner">
                    <div class="card-front"><div class="gift-icon">🎁</div><div class="click-me">點我抽</div></div>
                    <div class="card-back"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
                </div>
            </div>
            <div class="card" onclick="openCard(this)">
                <div class="card-inner">
                    <div class="card-front"><div class="gift-icon">🎁</div><div class="click-me">點我抽</div></div>
                    <div class="card-back"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 彈窗 -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-box">
            <div class="modal-icon">🔄</div>
            <div class="modal-title">哎呀！差一點點！</div>
            <div class="modal-text">獲得【再來一次】的機會！<br>不氣餒，好運就在下一格，請再洗牌抽一次吧！❤️</div>
            <button class="modal-btn" onclick="closeModal()">重新洗牌再抽！</button>
        </div>
    </div>

    <script>
        let isLocked = false;

        function openCard(element) {
            if (isLocked || element.classList.contains('flipped')) return;
            isLocked = true;

            // 執行翻牌
            element.classList.add('flipped');

            // 彈窗顯示
            setTimeout(() => {
                document.getElementById('resultModal').classList.add('active');
            }, 800);
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
            
            // 將所有卡片翻轉回來
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => card.classList.remove('flipped'));
            
            // 解鎖讓壽星可以重新點擊
            setTimeout(() => {
                isLocked = false;
            }, 600);
        }
    </script>
</body>
</html>
