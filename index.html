<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 壽星專屬！命運霓虹九宮格 🎁</title>
    <style>
        /* ==========================================================================
           1. 全局樣式與浪漫粉嫩風格配色
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4E1 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #FF69B4;
            font-size: 24px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #777;
            font-size: 13px;
            margin-bottom: 20px;
        }

        /* ==========================================================================
           2. 3x3 九宮格與跑馬燈亮圈樣式
           ========================================================================== */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        /* 固定顯示內容的精緻獎項格子 */
        .prize-box {
            background: #FFFFFF;
            border: 3px solid #FFE4B5;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
            transition: all 0.2s ease;
        }

        .prize-icon {
            font-size: 30px;
            margin-bottom: 3px;
        }

        .prize-name {
            font-size: 11px;
            font-weight: bold;
            color: #555;
            line-height: 1.2;
        }

        /* 【核心亮點：燈號效果】
           當格子被加上 .active 類別時，會激發高亮粉金邊框與強烈外發光陰影 */
        .prize-box.active {
            border-color: #FF1493;
            background: #FFF0F5;
            transform: scale(1.05);
            box-shadow: 0 0 20px #FF69B4, inset 0 0 10px #FFB6C1;
            z-index: 10;
        }

        /* 特別標註必中項目的顏色，讓畫面看起來多彩真實 */
        .prize-box.active .prize-name {
            color: #FF1493;
        }

        /* ==========================================================================
           3. 控制按鈕樣式 (PUNCH 命運煞車鍵)
           ========================================================================== */
        .action-btn {
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(255, 20, 147, 0.4);
            transition: all 0.1s ease;
            width: 80%;
            max-width: 280px;
        }

        .action-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 20, 147, 0.4);
        }

        .action-btn:disabled {
            background: #CCC;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ==========================================================================
           4. 可愛彈窗樣式
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #FFF;
            width: 85%;
            max-width: 320px;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #FFB6C1;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal-title {
            font-size: 20px;
            color: #FF69B4;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .modal-text {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .modal-btn {
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎂 Happy Birthday! 🎁</h1>
        <p class="subtitle">夢幻好禮全公開！按下按鈕考驗你的命運指尖吧！</p>
        
        <!-- 九宮格主體：直接將 9 個禮物項目公開顯示在對應格子 -->
        <div class="grid-container" id="grid">
            <div class="prize-box" id="cell-0"><div class="prize-icon">☕</div><div class="prize-name">星巴克飲料券</div></div>
            <div class="prize-box" id="cell-1"><div class="prize-icon">🎂</div><div class="prize-name">生日蛋糕</div></div>
            <div class="prize-box" id="cell-2"><div class="prize-icon">🍣</div><div class="prize-name">南港LaLaport</div></div>
            <div class="prize-box" id="cell-3"><div class="prize-icon">💵</div><div class="prize-name">現金5000</div></div>
            <div class="prize-box" id="cell-4"><div class="prize-icon">🎟️</div><div class="prize-name">統一1000禮卷</div></div>
            <div class="prize-box" id="cell-5"><div class="prize-icon">🎁</div><div class="prize-name">神秘禮物</div></div>
            <!-- 注意：此格為我們指定的目標「再來一次」 -->
            <div class="prize-box" id="cell-6"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
            <div class="prize-box" id="cell-7"><div class="prize-icon">🍢</div><div class="prize-name">終身豬血糕</div></div>
            <div class="prize-box" id="cell-8"><div class="prize-icon">🏖️</div><div class="prize-name">放假一天</div></div>
        </div>

        <!-- 命運控制大按鈕 -->
        <button class="action-btn" id="ctrlBtn" onclick="stopMarquee()">PUNCH！按下停止 🎯</button>
    </div>

    <!-- 可愛中獎彈窗 -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-box">
            <div class="modal-icon">🔄</div>
            <div class="modal-title">哎呀！差一點點！</div>
            <div class="modal-text">滑鼠稍微滑了一下！抽到【再來一次】！<br>大獎還在上面，調整好呼吸，再試一次！❤️</div>
            <button class="modal-btn" onclick="closeModal()">重洗好運再抽！</button>
        </div>
    </div>

    <!-- ==========================================================================
       5. 核心控燈與減速演算法控制邏輯
       ========================================================================== -->
    <script>
        // 【控制參數定義】
        let currentIndex = 0;      // 當前亮燈的格子索引 (0 ~ 8)
        let speed = 70;            // 霓虹燈初始亂跑的速度 (毫秒，越低越快)
        let timer = null;          // 計時器指針
        let isStopping = false;    // 狀態鎖定：紀錄 User 是否已經按下停止鍵

        // 定義九宮格九個格子視覺上隨機跳轉的跳轉數組，讓光圈看起來不是死板的轉圈，而是「真的在亂跳」
        const jumpSequence = [0, 4, 2, 6, 1, 7, 5, 3, 8];
        let seqPointer = 0;

        /**
         * 功能：啟動霓虹跑馬燈亂跳效果
         */
        function startMarquee() {
            if (timer) clearInterval(timer);
            isStopping = false;
            speed = 70; // 恢復快速亂跑狀態
            document.getElementById('ctrlBtn').disabled = false;
            document.getElementById('ctrlBtn').textContent = "PUNCH！按下停止 🎯";

            // 啟動定時監聽，每隔固定毫秒更換亮燈格子
            timer = setInterval(runLights, speed);
        }

        /**
         * 功能：燈號變更核心驅動
         */
        function runLights() {
            // 移除上一個格子的精美亮邊特效
            document.getElementById(`cell-${currentIndex}`).classList.remove('active');

            if (!isStopping) {
                // 【正常隨機亂跑期】：依照設定好的亂跳數組變更燈號
                seqPointer = (seqPointer + 1) % jumpSequence.length;
                currentIndex = jumpSequence[seqPointer];
            } else {
                // 【逐漸減速逼近必中目標期】：當按下停止後，強制燈號進入順序步進，並讓 speed 越來越慢
                currentIndex = (currentIndex + 1) % 9;
                
                clearInterval(timer);
                speed += 60; // 每次跑動增加延遲時間，做出「齒輪漸漸卡死、越來越慢」的逼真物理減速感

                // 核心外掛卡死條件：當減速到速度大於 350 毫秒，且剛好走到第 6 格（再來一次）時，完美定格煞車！
                if (speed > 350 && currentIndex === 6) {
                    document.getElementById(`cell-${currentIndex}`).classList.add('active');
                    setTimeout(() => {
                        showModal();
                    }, 600);
                    return; // 結束整個計時器迴圈
                }
                
                // 如果還沒降到足夠速度或還沒走到第 6 格，繼續遞迴呼叫直到煞車鎖死
                timer = setInterval(runLights, speed);
            }

            // 為當前被選中的格子套上高亮發光 CSS 樣式
            document.getElementById(`cell-${currentIndex}`).classList.add('active');
        }

        /**
         * 功能：觸發命運煞車按鈕
         */
        function stopMarquee() {
            if (isStopping) return; // 防止 User 連續瘋狂點擊按鈕
            isStopping = true;
            document.getElementById('ctrlBtn').disabled = true;
            document.getElementById('ctrlBtn').textContent = "正在計算結果...";
        }

        /**
         * 功能：顯示中獎惡搞彈窗
         */
        function showModal() {
            document.getElementById('resultModal').classList.add('active');
        }

        /**
         * 功能：關閉彈窗並重新啟動遊戲
         */
        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
            // 移除目前的 active 亮燈，準備重開
            document.getElementById(`cell-${currentIndex}`).classList.remove('active');
            // 重新開局亂跑
            startMarquee();
        }

        // 網頁完全載入後立即點亮霓虹燈
        window.onload = startMarquee;
    </script>
</body>
</html>
