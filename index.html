<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 壽星專屬！魔王級動感九宮格 🎁</title>
    <style>
        /* ==========================================================================
           1. 全局樣式與酷炫暗色霓虹風格
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2c1f2d 0%, #1a151b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #FF69B4;
            font-size: 26px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        .subtitle {
            color: #bfaabf;
            font-size: 13px;
            margin-bottom: 25px;
        }

        /* ==========================================================================
           2. 3x3 九宮格與跑馬燈亮圈樣式
           ========================================================================== */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* 獎項格子 */
        .prize-box {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 228, 181, 0.2);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            /* 【優化參數】調整 order 的 transition 時間為 0.15s，配合減速 30% 後的節奏，滑動更絲滑 */
            transition: border-color 0.15s, background 0.15s, transform 0.15s, box-shadow 0.15s, order 0.15s ease-in-out;
        }

        .prize-icon {
            font-size: 32px;
            margin-bottom: 4px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .prize-name {
            font-size: 11px;
            font-weight: bold;
            color: #e0cfe0;
            line-height: 1.2;
        }

        /* 跑馬燈發光高亮特效 */
        .prize-box.active {
            border-color: #FF1493;
            background: rgba(255, 105, 180, 0.2);
            transform: scale(1.08);
            box-shadow: 0 0 25px #FF69B4, inset 0 0 10px #FFB6C1;
            z-index: 10;
        }

        .prize-box.active .prize-name {
            color: #FFF;
            text-shadow: 0 0 5px #FF1493;
        }

        /* ==========================================================================
           3. 控制按鈕樣式
           ========================================================================== */
        .action-btn {
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.6);
            transition: all 0.1s ease;
            width: 85%;
            max-width: 280px;
            letter-spacing: 1px;
        }

        .action-btn:disabled {
            background: #555;
            color: #aaa;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ==========================================================================
           4. 可愛彈窗樣式
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #FFF;
            width: 85%;
            max-width: 320px;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #FFB6C1;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 55px;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal-title {
            font-size: 22px;
            color: #FF69B4;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .modal-text {
            font-size: 15px;
            color: #444;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .modal-btn {
            background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎂 Happy Birthday! 🎁</h1>
        <p class="subtitle">空間扭曲！格子跟霓虹燈都在亂跑！抓準時機按停止！</p>
        
        <div class="grid-container" id="grid">
            <div class="prize-box" id="cell-0"><div class="prize-icon">☕</div><div class="prize-name">星巴克飲料券</div></div>
            <div class="prize-box" id="cell-1"><div class="prize-icon">🎂</div><div class="prize-name">生日蛋糕</div></div>
            <div class="prize-box" id="cell-2"><div class="prize-icon">🍣</div><div class="prize-name">南港LaLaport</div></div>
            <div class="prize-box" id="cell-3"><div class="prize-icon">💵</div><div class="prize-name">現金5000</div></div>
            <div class="prize-box" id="cell-4"><div class="prize-icon">🎟️</div><div class="prize-name">統一1000禮卷</div></div>
            <div class="prize-box" id="cell-5"><div class="prize-icon">🎁</div><div class="prize-name">神秘禮物</div></div>
            <div class="prize-box" id="cell-6"><div class="prize-icon">🔄</div><div class="prize-name">再來一次</div></div>
            <div class="prize-box" id="cell-7"><div class="prize-icon">🍢</div><div class="prize-name">終身豬血糕</div></div>
            <div class="prize-box" id="cell-8"><div class="prize-icon">🏖️</div><div class="prize-name">放假一天</div></div>
        </div>

        <button class="action-btn" id="ctrlBtn" onclick="stopMarquee()">PUNCH！按下停止 🎯</button>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-box">
            <div class="modal-icon">🔄</div>
            <div class="modal-title">哎呀！差一點點！</div>
            <div class="modal-text">位置轉移得太快了！竟然轉到【再來一次】！<br>大獎還在扭曲空間裡，看準時機再挑戰一次！❤️</div>
            <button class="modal-btn" onclick="closeModal()">空間重置再抽！</button>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let speed = 70;
        let timer = null;
        let gridTimer = null;      // 【新增參數】獨立控制九宮格格子移動的計時器
        let isStopping = false;
        const jumpSequence = [0, 4, 2, 6, 1, 7, 5, 3, 8];
        let seqPointer = 0;
        let audioCtx = null;

        /**
         * 參數說明：音效合成器函數
         * @param {number} frequency - 聲音頻率 (Hz)
         * @param {string} type - 波形種類 ('sine', 'square', 'triangle', 'sawtooth')
         * @param {number} duration - 聲音持續時間 (秒)
         */
        function playSound(frequency, type, duration) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = type;
                oscillator.frequency.value = frequency;

                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log("Audio Error");
            }
        }

        /**
         * 參數說明：動態混淆九宮格位置（大風吹效果）
         */
        function shuffleGridPositions() {
            if (isStopping) return; // 如果按下停止，立刻凍結格子位置
            const orders = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
            for (let i = 0; i < 9; i++) {
                document.getElementById(`cell-${i}`).style.order = orders[i];
            }
        }

        /**
         * 功能：啟動雙重隨機跑馬燈
         */
        function startMarquee() {
            if (timer) clearInterval(timer);
            if (gridTimer) clearInterval(gridTimer);
            
            isStopping = false;
            speed = 70;
            document.getElementById('ctrlBtn').disabled = false;
            document.getElementById('ctrlBtn').textContent = "PUNCH！按下停止 🎯";

            // 1. 光圈跑馬燈維持原速（70毫秒跳一格），保持快節奏的電子樂趣
            timer = setInterval(runLights, speed);
            
            // 2. 【核心修改參數】格子移動速度減少 30%：從 70ms 慢到 100ms
            gridTimer = setInterval(shuffleGridPositions, 100);
        }

        /**
         * 功能：驅動跑馬燈與音效
         */
        function runLights() {
            document.getElementById(`cell-${currentIndex}`).classList.remove('active');

            if (!isStopping) {
                // 【正常衝刺期】：光圈亂跳
                seqPointer = (seqPointer + 1) % jumpSequence.length;
                currentIndex = jumpSequence[seqPointer];
                
                playSound(659.25, 'sine', 0.04); // E5 輕快嗶嗶音
            } else {
                // 【按下停止後的減速期】：格子已在 stopMarquee() 內 clearInterval 凍結
                currentIndex = (currentIndex + 1) % 9;
                clearInterval(timer);
                speed += 60; 

                let currentPitch = 440 - (speed * 0.5); 
                if (currentPitch < 150) currentPitch = 150;
                playSound(currentPitch, 'triangle', 0.08); 

                // 煞車鎖死條件：速度夠慢且光圈剛好壓在第 6 格（再來一次）上
                if (speed > 350 && currentIndex === 6) {
                    document.getElementById(`cell-${currentIndex}`).classList.add('active');
                    
                    // 終極勝利整人和弦音效
                    setTimeout(() => { playSound(392.00, 'square', 0.1); }, 0);   
                    setTimeout(() => { playSound(523.25, 'square', 0.1); }, 80);  
                    setTimeout(() => { playSound(659.25, 'square', 0.12); }, 160); 
                    setTimeout(() => { playSound(783.99, 'square', 0.3); }, 240);  

                    setTimeout(() => {
                        showModal();
                    }, 700);
                    return;
                }
                
                timer = setInterval(runLights, speed);
            }

            document.getElementById(`cell-${currentIndex}`).classList.add('active');
        }

        function stopMarquee() {
            if (isStopping) return;
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            isStopping = true;
            
            // 按下停止時，立刻清除格子移動計時器，強制格子定格
            clearInterval(gridTimer); 
            
            document.getElementById('ctrlBtn').disabled = true;
            document.getElementById('ctrlBtn').textContent = "正在計算結果...";
        }

        function showModal() {
            document.getElementById('resultModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.remove('active');
            document.getElementById(`cell-${currentIndex}`).classList.remove('active');
            
            // 重置時，把九宮格順序回歸正常 (1~9 排好)
            for (let i = 0; i < 9; i++) {
                document.getElementById(`cell-${i}`).style.order = i + 1;
            }
            
            startMarquee();
        }

        window.onload = startMarquee;
    </script>
</body>
</html>
